<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download — Utopia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Infernum Obsidian Dark Palette ── */
      --bg: #030303;
      --surface: rgba(255, 255, 255, 0.03);
      --card: rgba(255, 255, 255, 0.015);
      --border: rgba(255, 255, 255, 0.06);
      --text: #ffffff;
      --sub: rgba(255, 255, 255, 0.6);
      --dim: rgba(255, 255, 255, 0.35);
      --primary: #ffffff;
      --accent-purple: #8b5cf6;
      --accent-cyan: #06b6d4;
      --line: rgba(255, 255, 255, 0.08);
      --btn-bg: #ffffff;
      --btn-fg: #000000;
      --error: #ef4444;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 1.5rem;
      position: relative;
    }

    /* Grain Overlay */
    .grain-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0.02;
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Ambient Gradients */
    .ambient-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.35;
      mix-blend-mode: screen;
    }

    .orb-1 {
      top: -15%;
      left: 15%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
      animation: floatOrb1 22s infinite ease-in-out alternate;
    }

    .orb-2 {
      bottom: -15%;
      right: 15%;
      width: 550px;
      height: 550px;
      background: radial-gradient(circle, var(--accent-cyan) 0%, transparent 70%);
      animation: floatOrb2 25s infinite ease-in-out alternate;
    }

    @keyframes floatOrb1 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(80px, 60px) scale(1.1); }
      100% { transform: translate(-30px, 120px) scale(0.95); }
    }

    @keyframes floatOrb2 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-80px, -90px) scale(0.95); }
      100% { transform: translate(60px, 40px) scale(1.1); }
    }

    .wrap {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      position: relative;
      z-index: 1;
    }

    /* HEAD */
    .head {
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.5s ease forwards 0.1s;
    }

    .site-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 400;
      color: var(--dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.3s ease;
      display: inline-block;
    }
    .site-tag:hover { color: #ffffff; }

    .app-name {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-top: 4px;
      background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* BLOCK (Glassmorphic Table) */
    .block {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.5rem 1.4rem;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.5s ease forwards 0.2s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--line);
    }
    .row:last-child {
      border-bottom: none;
    }

    .row-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sub);
    }

    .row-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.01em;
      transition: opacity 0.3s;
    }

    .row-value.loading {
      opacity: 0.3;
      animation: pulse 1.2s ease-in-out infinite;
    }

    /* DEVICE ROW */
    .device-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: none;
    }

    .device-abi {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      color: #34d399; /* emerald accent */
      letter-spacing: 0.02em;
    }

    /* BUTTON */
    .btn-wrap {
      padding-top: 0.25rem;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.5s ease forwards 0.3s;
    }

    .dl-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 1.1rem 1.5rem;
      background: var(--btn-bg);
      border: 1px solid var(--btn-bg);
      color: var(--btn-fg);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.05);
    }

    .dl-btn:hover {
      background: transparent;
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(255, 255, 255, 0.08);
    }
    .dl-btn:active {
      transform: translateY(0);
    }
    .dl-btn.disabled {
      opacity: 0.25;
      pointer-events: none;
      cursor: default;
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
      color: var(--dim);
      box-shadow: none;
    }

    .btn-arrow {
      font-size: 1.1rem;
      line-height: 1;
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .dl-btn:hover .btn-arrow {
      transform: translateY(2px);
    }

    /* NOTE */
    .note-wrap {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.5s ease forwards 0.4s;
      padding-left: 0.25rem;
    }

    .note {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--sub);
      letter-spacing: 0.02em;
      line-height: 1.6;
    }

    .note a {
      color: #60a5fa; /* light blue for link */
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }
    .note a:hover {
      color: #ffffff;
    }

    .note.error { color: var(--error); }

    /* FOOTER */
    .foot {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      text-align: center;
      border-top: 1px solid var(--line);
      padding-top: 1.5rem;
      margin-top: 1rem;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.5s;
    }

    /* SPINNER */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 1.5px solid var(--dim);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 400px) {
      body { padding: 2.5rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="grain-overlay"></div>
  
  <div class="ambient-glow">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="wrap">
    <!-- Head -->
    <div class="head">
      <a class="site-tag" href="/">INFERNUM</a>
      <h1 class="app-name">Utopia</h1>
    </div>

    <!-- Data Table -->
    <div class="block">
      <div class="row">
        <span class="row-label">Version</span>
        <span class="row-value loading" id="version-val">—</span>
      </div>
      <div class="row">
        <span class="row-label">Released</span>
        <span class="row-value loading" id="date-val">—</span>
      </div>
      <div class="row">
        <span class="row-label">Platform</span>
        <span class="row-value">Android</span>
      </div>
      <div class="row">
        <span class="row-label">Format</span>
        <span class="row-value">.apk</span>
      </div>
      <div class="device-row">
        <span class="row-label">Your device</span>
        <span class="device-abi" id="abi-val">detecting…</span>
      </div>
    </div>

    <!-- Button -->
    <div class="btn-wrap">
      <a class="dl-btn disabled" id="dl-btn" href="#" onclick="onDl(event)">
        <span id="btn-text"><span class="spinner"></span>Loading</span>
        <span class="btn-arrow" id="btn-arrow">↓</span>
      </a>
    </div>

    <!-- Note -->
    <div class="note-wrap">
      <p class="note" id="status-note">Fetching latest release…</p>
    </div>

    <!-- Footer -->
    <p class="foot">© 2026 INFERNUM • EDITORIAL SOLITUDE</p>
  </div>

  <script>
    const REPO = "infernoGurala/utopia-app";
    const API  = `https://api.github.com/repos/${REPO}/releases/latest`;

    // State
    let apkUrl      = null;
    let releaseUrl  = null;
    let detectedAbi = "arm64-v8a"; // safe default

    // ── ABI detection ──────────────────────────────────────────────
    async function detectAbi() {
      const abiEl = document.getElementById("abi-val");

      try {
        if (navigator.userAgentData) {
          const d = await navigator.userAgentData.getHighEntropyValues(["architecture", "bitness"]);
          const arch = (d.architecture || "").toLowerCase();
          const bits = d.bitness;

          if (arch.includes("x86") || arch.includes("x64")) {
            detectedAbi = "x86_64";
          } else if (bits === "32") {
            detectedAbi = "armeabi-v7a";
          } else {
            detectedAbi = "arm64-v8a";
          }
        } else {
          // UA fallback — modern Android → arm64
          const ua = navigator.userAgent || "";
          if (/android/i.test(ua)) {
            detectedAbi = "arm64-v8a";
          } else {
            detectedAbi = "x86_64"; // desktop / emulator
          }
        }
      } catch {
        detectedAbi = "arm64-v8a";
      }

      abiEl.textContent = detectedAbi;
    }

    // ── GitHub release fetch ───────────────────────────────────────
    async function fetchRelease() {
      const versionEl = document.getElementById("version-val");
      const dateEl    = document.getElementById("date-val");
      const noteEl    = document.getElementById("status-note");
      const btnEl     = document.getElementById("dl-btn");
      const btnText   = document.getElementById("btn-text");

      try {
        const res = await fetch(API, {
          headers: { "Accept": "application/vnd.github+json" }
        });

        if (!res.ok) throw new Error(`GitHub API: ${res.status}`);

        const data = await res.json();

        // Version tag
        const tag = data.tag_name || "unknown";
        versionEl.textContent = tag;
        versionEl.classList.remove("loading");

        // Release date
        const rawDate = data.published_at || data.created_at;
        if (rawDate) {
          const d = new Date(rawDate);
          dateEl.textContent = d.toLocaleDateString("en-GB", {
            day: "2-digit", month: "short", year: "numeric"
          });
        } else {
          dateEl.textContent = "—";
        }
        dateEl.classList.remove("loading");

        // Release page URL
        releaseUrl = data.html_url || `https://github.com/${REPO}/releases/latest`;

        // Find APK assets
        const assets = data.assets || [];
        const find = (keyword) =>
          assets.find(a => a.name.toLowerCase().includes(keyword.toLowerCase()))
            ?.browser_download_url || null;

        const urls = {
          "arm64-v8a":    find("arm64-v8a"),
          "armeabi-v7a":  find("armeabi-v7a"),
          "x86_64":       find("x86_64"),
          "universal":    find("universal"),
        };

        // Pick best match for detected ABI, fallback chain
        apkUrl =
          urls[detectedAbi] ||
          urls["arm64-v8a"] ||
          urls["universal"] ||
          Object.values(urls).find(Boolean) ||
          null;

        if (apkUrl) {
          btnEl.classList.remove("disabled");
          btnText.textContent = "Download";
          noteEl.classList.remove("error");
          noteEl.innerHTML = `
            Latest · <a href="${releaseUrl}" target="_blank" rel="noopener">View release notes ↗</a>
          `;
        } else {
          throw new Error("No APK assets found in latest release.");
        }

      } catch (err) {
        versionEl.textContent = "error";
        versionEl.classList.remove("loading");
        dateEl.textContent = "—";
        dateEl.classList.remove("loading");

        btnText.textContent = "Unavailable";
        noteEl.textContent = `Could not fetch release. Check GitHub or try again later.`;
        noteEl.classList.add("error");

        console.error("Release fetch failed:", err);
      }
    }

    // ── Download handler ───────────────────────────────────────────
    function onDl(e) {
      e.preventDefault();
      if (!apkUrl) return;

      const btnEl   = document.getElementById("dl-btn");
      const btnText = document.getElementById("btn-text");
      const noteEl  = document.getElementById("status-note");

      btnText.textContent = "Opening…";
      btnEl.style.background = "rgba(255,255,255,0.08)";
      btnEl.style.color = "#ffffff";
      btnEl.style.borderColor = "rgba(255,255,255,0.2)";

      const ua = navigator.userAgent || "";
      const isAndroid = /android/i.test(ua);

      if (isAndroid) {
        // intent:// forces Chrome to open, bypasses in-app browser (e.g. WhatsApp)
        const intent = "intent://" +
          apkUrl.replace(/^https?:\/\//, "") +
          "#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" +
          encodeURIComponent(apkUrl) + ";end";
        window.location.href = intent;
      } else {
        window.open(apkUrl, "_blank");
      }

      setTimeout(() => {
        btnText.textContent = "Download";
        btnEl.style.background = "";
        btnEl.style.color = "";
        btnEl.style.borderColor = "";
        if (releaseUrl) {
          noteEl.innerHTML = `Latest · <a href="${releaseUrl}" target="_blank" rel="noopener">View release notes ↗</a>`;
        }
      }, 3000);
    }

    // ── Init ───────────────────────────────────────────────────────
    (async () => {
      await detectAbi();
      await fetchRelease();
    })();
  </script>
</body>
</html>
