<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download — Utopia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f0ede6;
      --muted: #555;
      --line: rgba(255,255,255,0.07);
      --accent: #c8b89a;
      --btn-bg: #f0ede6;
      --btn-fg: #0a0a0a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Syne', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .wrap {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .head {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .site-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }

    .site-tag:hover { color: var(--accent); }

    .app-name {
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-top: 2px;
    }

    .block {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--line);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--line);
    }

    .row-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .row-value {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--fg);
      letter-spacing: 0.04em;
    }

    .btn-wrap {
      padding-top: 0.25rem;
    }

    .dl-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.9rem 1.2rem;
      background: var(--btn-bg);
      color: var(--btn-fg);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .dl-btn:hover { background: var(--accent); }
    .dl-btn:active { transform: scale(0.98); }

    .btn-arrow {
      font-size: 1rem;
      transition: transform 0.2s;
    }

    .dl-btn:hover .btn-arrow { transform: translateY(3px); }

    .note {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .foot {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    @media (max-width: 400px) {
      body { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="head">
      <a class="site-tag" href="/">inferalis.space</a>
      <h1 class="app-name">Delve</h1>
    </div>

    <div class="block">
      <div class="row">
        <span class="row-label">Version</span>
        <span class="row-value" id="version-label">v1.0(Beta)</span>
      </div>
      <div class="row">
        <span class="row-label">Platform</span>
        <span class="row-value">Android Preview</span>
      </div>
      <div class="row">
        <span class="row-label">Format</span>
        <span class="row-value">.apk</span>
      </div>
    </div>

    <div class="btn-wrap">
      <a class="dl-btn" id="dl-btn" href="#" onclick="onDl(event)">
        <span id="btn-text">Download</span>
        <span class="btn-arrow" id="btn-arrow">↓</span>
      </a>
    </div>

    <p class="note" id="status-note">Testing · Beta preview</p>

    <p class="foot">© 2026 inferalis</p>
  </div>

  <script>
    const APK = "https://github.com/infernoGurala/Delve-app/releases/download/v1.0(Beta)/DELVE-Beta.1.0.apk";
    const INTENT = "intent://github.com/infernoGurala/Delve-app/releases/download/v1.0(Beta)/DELVE-Beta.1.0.apk#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" + encodeURIComponent(APK) + ";end";

    function onDl(e) {
      e.preventDefault();
      const text = document.getElementById("btn-text");
      const note = document.getElementById("status-note");
      const btn = document.getElementById("dl-btn");

      text.textContent = "Opening…";
      note.textContent = "launching in chrome";
      btn.style.background = "var(--accent)";

      const ua = navigator.userAgent || "";
      const isAndroid = /android/i.test(ua);

      if (isAndroid) {
        window.location.href = INTENT;
      } else {
        window.open(APK, "_blank");
      }

      setTimeout(() => {
        text.textContent = "Download";
        note.textContent = "Testing · Beta preview";
        btn.style.background = "";
      }, 3000);
    }
  </script>
</body>
</html>
