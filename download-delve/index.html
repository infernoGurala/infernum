<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download — Delve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Infernum Obsidian Dark Palette ── */
      --bg: #030303;
      --surface: rgba(255, 255, 255, 0.03);
      --card: rgba(255, 255, 255, 0.015);
      --border: rgba(255, 255, 255, 0.06);
      --text: #ffffff;
      --sub: rgba(255, 255, 255, 0.6);
      --dim: rgba(255, 255, 255, 0.35);
      --primary: #ffffff;
      --accent-purple: #8b5cf6;
      --accent-cyan: #06b6d4;
      --line: rgba(255, 255, 255, 0.08);
      --btn-bg: #ffffff;
      --btn-fg: #000000;
      --error: #ef4444;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 5rem 1.5rem 3rem 1.5rem;
      position: relative;
    }

    /* Grain Overlay */
    .grain-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0.02;
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Ambient Gradients */
    .ambient-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.35;
      mix-blend-mode: screen;
      will-change: transform;
    }

    .orb-1 {
      top: -15%;
      left: 15%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
    }

    .orb-2 {
      bottom: -15%;
      right: 15%;
      width: 550px;
      height: 550px;
      background: radial-gradient(circle, var(--accent-cyan) 0%, transparent 70%);
    }

    .wrap {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      position: relative;
      z-index: 1;
      margin: auto 0;
    }

    /* HEAD */
    /* HEAD */
    .head {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 1.4rem;
    }

    .site-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 400;
      color: var(--dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.3s ease, opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      display: inline-block;
      opacity: 0;
      transform: translateY(6px);
    }
    .site-tag:hover { color: #ffffff; }

    .app-name {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-top: 4px;
      background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      will-change: transform, opacity, letter-spacing;
    }

    /* BLOCK (Glassmorphic Table) */
    .block {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.5rem 1.4rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--line);
    }
    .row:last-child {
      border-bottom: none;
    }

    .row-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sub);
    }

    .row-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.01em;
      transition: opacity 0.3s;
    }

    .row-value.loading {
      opacity: 0.3;
      animation: pulse 1.2s ease-in-out infinite;
    }

    /* DEVICE ROW */
    .device-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: none;
    }

    .device-abi {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      color: #34d399; /* emerald accent */
      letter-spacing: 0.02em;
    }

    /* BUTTON WRAP & MORPH TRIGGERS */
    .btn-wrap {
      padding-top: 0.25rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      justify-content: center;
    }

    .dl-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 48px;
      padding: 0 1.5rem;
      background: var(--btn-bg);
      border: 1px solid var(--btn-bg);
      color: var(--btn-fg);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.05);
      overflow: hidden;
    }

    .dl-btn:hover {
      background: transparent;
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(255, 255, 255, 0.08);
    }
    .dl-btn:active {
      transform: translateY(0);
    }
    .dl-btn.disabled {
      opacity: 0.25;
      pointer-events: none;
      cursor: default;
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
      color: var(--dim);
      box-shadow: none;
    }

    .btn-text-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.3s ease, transform 0.3s ease;
      opacity: 1;
    }

    .btn-arrow {
      font-size: 1.1rem;
      line-height: 1;
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 1;
    }
    .dl-btn:hover .btn-arrow {
      transform: translateY(2px);
    }

    /* Morphing state 1: loading circle */
    .dl-btn.loading-state {
      width: 48px;
      padding: 0;
      border-radius: 50%;
      background: transparent;
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    .dl-btn.loading-state .btn-text-wrap {
      opacity: 0;
      transform: translateX(-8px);
      pointer-events: none;
    }
    .dl-btn.loading-state .btn-arrow {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }
    
    /* Morphing state 2: success confirmation */
    .dl-btn.success-state {
      width: 48px;
      padding: 0;
      border-radius: 50%;
      background: #10b981;
      border-color: #10b981;
      color: #ffffff;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
    }

    .dl-btn.success-state .btn-text-wrap {
      opacity: 0;
      transform: translateX(-8px);
      pointer-events: none;
    }
    .dl-btn.success-state .btn-arrow {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    /* SPINNERS */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 1.5px solid var(--dim);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    .center-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: centerSpin 0.6s linear infinite;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .dl-btn.loading-state .center-spinner {
      opacity: 1;
      pointer-events: auto;
    }

    .success-checkmark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      font-size: 1.25rem;
      font-weight: bold;
      color: #ffffff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .dl-btn.success-state .success-checkmark {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    @keyframes popIn {
      from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    /* NOTE */
    .note-wrap {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      padding-left: 0.25rem;
    }

    .note {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--sub);
      letter-spacing: 0.02em;
      line-height: 1.6;
    }

    .note a {
      color: #60a5fa;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }
    .note a:hover {
      color: #ffffff;
    }

    .note.error { color: var(--error); }

    /* FOOTER */
    .foot {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      text-align: center;
      border-top: 1px solid var(--line);
      padding-top: 1.5rem;
      margin-top: 1rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Cinematic Text-Blur Boot Loader */
    .intro-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #020202;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      will-change: opacity;
    }

    .intro-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .intro-logo {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2rem, 8vw, 3.2rem);
      font-weight: 800;
      color: #ffffff;
      text-transform: uppercase;
      filter: blur(12px);
      opacity: 0;
      transform: scale(0.94);
      animation: cinematicReveal 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: filter, opacity, transform, letter-spacing;
      transition: opacity 0.3s ease;
    }

    .intro-subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.4s;
    }

    .intro-bar-container {
      width: 110px;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
      border-radius: 1px;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.6s;
    }

    .intro-bar {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #ffffff, transparent);
      animation: progressFill 1.3s cubic-bezier(0.5, 0, 0.2, 1) forwards 0.5s;
    }

    @keyframes cinematicReveal {
      0% {
        filter: blur(15px);
        opacity: 0;
        letter-spacing: 0.6em;
        transform: scale(0.9);
      }
      100% {
        filter: blur(0);
        opacity: 1;
        letter-spacing: 0.22em;
        transform: scale(1);
      }
    }

    @keyframes progressFill {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ANIMATIONS */

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes centerSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @media (max-width: 400px) {
      body { padding: 4rem 1rem 2.5rem 1rem; }
      .wrap { margin: 1.5rem 0; }
    }
  </style>
</head>
<body>
  <div class="grain-overlay"></div>
  
  <div class="ambient-glow">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <!-- Cinematic Text-Blur Boot Loader -->
  <div class="intro-screen" id="intro-screen">
    <div class="intro-content">
      <div class="intro-logo" id="intro-logo">Delve</div>
      <div class="intro-subtitle">Inferno-gurala's</div>
      <div class="intro-bar-container">
        <div class="intro-bar"></div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- Head -->
    <div class="head">
      <a class="site-tag" href="/">INFERNUM</a>
      <h1 class="app-name" id="main-logo">Delve</h1>
    </div>

    <!-- Data Table -->
    <div class="block">
      <div class="row">
        <span class="row-label">Version</span>
        <span class="row-value loading" id="version-val">—</span>
      </div>
      <div class="row">
        <span class="row-label">Released</span>
        <span class="row-value loading" id="date-val">—</span>
      </div>
      <div class="row">
        <span class="row-label">Platform</span>
        <span class="row-value">Android</span>
      </div>
      <div class="row">
        <span class="row-label">Format</span>
        <span class="row-value">.apk</span>
      </div>
      <div class="device-row">
        <span class="row-label">Your device</span>
        <span class="device-abi" id="abi-val">detecting…</span>
      </div>
    </div>

    <!-- Button -->
    <div class="btn-wrap">
      <a class="dl-btn disabled" id="dl-btn" href="#" onclick="onDl(event)">
        <span class="btn-text-wrap" id="btn-text-wrap">
          <span class="spinner" id="btn-spinner"></span>
          <span id="btn-text-content">Loading</span>
        </span>
        <span class="btn-arrow" id="btn-arrow">↓</span>
        <span class="center-spinner" id="btn-spinner-center"></span>
        <span class="success-checkmark" id="btn-checkmark">✓</span>
      </a>
    </div>

    <!-- Note -->
    <div class="note-wrap">
      <p class="note" id="status-note">Fetching latest release…</p>
    </div>

    <!-- Footer -->
    <p class="foot">© 2026 INFERNUM • INFERNO GURALA</p>
  </div>

  <script>
    const REPO = "infernoGurala/delve-app";
    const API  = `https://api.github.com/repos/${REPO}/releases/latest`;

    // State
    let apkUrl      = null;
    let releaseUrl  = null;
    let detectedAbi = "arm64-v8a"; // safe default

    // ── ABI detection ──────────────────────────────────────────────
    async function detectAbi() {
      const abiEl = document.getElementById("abi-val");

      try {
        if (navigator.userAgentData) {
          const d = await navigator.userAgentData.getHighEntropyValues(["architecture", "bitness"]);
          const arch = (d.architecture || "").toLowerCase();
          const bits = d.bitness;

          if (arch.includes("x86") || arch.includes("x64")) {
            detectedAbi = "x86_64";
          } else if (bits === "32") {
            detectedAbi = "armeabi-v7a";
          } else {
            detectedAbi = "arm64-v8a";
          }
        } else {
          // UA fallback — modern Android → arm64
          const ua = navigator.userAgent || "";
          if (/android/i.test(ua)) {
            detectedAbi = "arm64-v8a";
          } else {
            detectedAbi = "x86_64"; // desktop / emulator
          }
        }
      } catch {
        detectedAbi = "arm64-v8a";
      }

      abiEl.textContent = detectedAbi;
    }

    // ── GitHub release fetch ───────────────────────────────────────
    async function fetchRelease() {
      const versionEl = document.getElementById("version-val");
      const dateEl    = document.getElementById("date-val");
      const noteEl    = document.getElementById("status-note");
      const btnEl     = document.getElementById("dl-btn");
      const btnSpinner = document.getElementById("btn-spinner");
      const btnTextContent = document.getElementById("btn-text-content");

      try {
        const res = await fetch(API, {
          headers: { "Accept": "application/vnd.github+json" }
        });

        if (!res.ok) throw new Error(`GitHub API: ${res.status}`);

        const data = await res.json();

        // Version tag
        const tag = data.tag_name || "unknown";
        versionEl.textContent = tag;
        versionEl.classList.remove("loading");

        // Release date
        const rawDate = data.published_at || data.created_at;
        if (rawDate) {
          const d = new Date(rawDate);
          dateEl.textContent = d.toLocaleDateString("en-GB", {
            day: "2-digit", month: "short", year: "numeric"
          });
        } else {
          dateEl.textContent = "—";
        }
        dateEl.classList.remove("loading");

        // Release page URL
        releaseUrl = data.html_url || `https://github.com/${REPO}/releases/latest`;

        // Find APK assets by exact filename
        const assets = data.assets || [];
        const findByName = (filename) =>
          assets.find(a => a.name === filename)?.browser_download_url || null;

        const urls = {
          "armeabi-v7a": findByName("app-armeabi-v7a-release.apk"),
          "arm64-v8a":   findByName("app-arm64-v8a-release.apk"),
          "x86_64":      findByName("app-x86_64-release.apk"),
          "universal":   findByName("app-release.apk"),
        };

        // Pick best match for detected ABI, fallback chain
        apkUrl =
          urls[detectedAbi] ||
          urls["arm64-v8a"] ||
          urls["universal"] ||
          Object.values(urls).find(Boolean) ||
          null;

        if (apkUrl) {
          btnEl.classList.remove("disabled");
          btnSpinner.style.display = "none";
          btnTextContent.textContent = "Download";
          noteEl.classList.remove("error");
          noteEl.innerHTML = `
            Latest · <a href="${releaseUrl}" target="_blank" rel="noopener">View release notes ↗</a>
          `;
        } else {
          throw new Error("No APK assets found in latest release.");
        }

      } catch (err) {
        versionEl.textContent = "error";
        versionEl.classList.remove("loading");
        dateEl.textContent = "—";
        dateEl.classList.remove("loading");

        btnSpinner.style.display = "none";
        btnTextContent.textContent = "Unavailable";
        noteEl.textContent = `Could not fetch release. Check GitHub or try again later.`;
        noteEl.classList.add("error");

        console.error("Release fetch failed:", err);
      }
    }

    // ── Download handler ───────────────────────────────────────────
    function onDl(e) {
      e.preventDefault();
      if (!apkUrl) return;

      const btnEl   = document.getElementById("dl-btn");
      const btnSpinner = document.getElementById("btn-spinner");
      const btnTextContent = document.getElementById("btn-text-content");
      const noteEl  = document.getElementById("status-note");

      // Morph into circular spinner state
      btnSpinner.style.display = "inline-block";
      btnEl.classList.add("loading-state");

      const ua = navigator.userAgent || "";
      const isAndroid = /android/i.test(ua);

      setTimeout(() => {
        if (isAndroid) {
          const intent = "intent://" +
            apkUrl.replace(/^https?:\/\//, "") +
            "#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" +
            encodeURIComponent(apkUrl) + ";end";
          window.location.href = intent;
        } else {
          window.open(apkUrl, "_blank");
        }

        // Morph into success state
        btnEl.classList.remove("loading-state");
        btnEl.classList.add("success-state");

        setTimeout(() => {
          // Reset morph button states
          btnEl.classList.remove("success-state");
          btnSpinner.style.display = "none";
          btnTextContent.textContent = "Download";
          if (releaseUrl) {
            noteEl.innerHTML = `Latest · <a href="${releaseUrl}" target="_blank" rel="noopener">View release notes ↗</a>`;
          }
        }, 2500);
      }, 1200);
    }

    // ── INTERACTIVE ORB GRAVITY DRIFT ────────────────────────────────
    const orb1 = document.querySelector('.orb-1');
    const orb2 = document.querySelector('.orb-2');
    
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    
    let orb1X = 0;
    let orb1Y = 0;
    let orb2X = 0;
    let orb2Y = 0;
    
    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    
    function updateOrbs() {
      const target1X = (mouseX - window.innerWidth / 2) * 0.08;
      const target1Y = (mouseY - window.innerHeight / 2) * 0.08;
      
      const target2X = (mouseX - window.innerWidth / 2) * -0.06;
      const target2Y = (mouseY - window.innerHeight / 2) * -0.06;
      
      orb1X += (target1X - orb1X) * 0.04;
      orb1Y += (target1Y - orb1Y) * 0.04;
      
      orb2X += (target2X - orb2X) * 0.04;
      orb2Y += (target2Y - orb2Y) * 0.04;
      
      orb1.style.transform = `translate(${orb1X}px, ${orb1Y}px)`;
      orb2.style.transform = `translate(${orb2X}px, ${orb2Y}px)`;
      
      requestAnimationFrame(updateOrbs);
    }
    updateOrbs();

    // ── HYBRID SEAMLESS LOGO FLIP & INTRO REVEAL ──────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const introLogo = document.getElementById('intro-logo');
      const mainLogo = document.getElementById('main-logo');
      const intro = document.getElementById('intro-screen');
      const siteTag = document.querySelector('.site-tag');
      const block = document.querySelector('.block');
      const btnWrap = document.querySelector('.btn-wrap');
      const noteWrap = document.querySelector('.note-wrap');
      const foot = document.querySelector('.foot');
      
      // We perform the FLIP position swap after the intro animation finishes (2.0s)
      setTimeout(() => {
        const introRect = introLogo.getBoundingClientRect();
        const mainRect = mainLogo.getBoundingClientRect();
        
        if (introRect.width === 0) return;
        
        // Calculate exact scale and translation offsets
        const scaleX = introRect.width / mainRect.width;
        const scaleY = introRect.height / mainRect.height;
        const deltaX = introRect.left - mainRect.left;
        const deltaY = introRect.top - mainRect.top;
        
        // 1. Instantly snap mainLogo over introLogo (rendered identical in center)
        mainLogo.style.transition = 'none';
        mainLogo.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(${scaleX}, ${scaleY})`;
        mainLogo.style.letterSpacing = '0.22em'; // match intro spacing
        mainLogo.style.opacity = '1';
        
        // Hide original intro logo and fade out the background intro overlay
        introLogo.style.opacity = '0';
        intro.style.transition = 'opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
        intro.style.opacity = '0';
        intro.style.pointerEvents = 'none';
        
        // Force reflow
        mainLogo.offsetHeight;
        
        // 2. Animate mainLogo from center to static header coordinates
        mainLogo.style.transition = 'transform 1.1s cubic-bezier(0.16, 1, 0.3, 1), letter-spacing 1.1s cubic-bezier(0.16, 1, 0.3, 1)';
        mainLogo.style.transform = 'translate(0, 0) scale(1)';
        mainLogo.style.letterSpacing = '-0.02em';
        
        // 3. Reveal rest of components staggered
        setTimeout(() => {
          siteTag.style.opacity = '1';
          siteTag.style.transform = 'translateY(0)';
          
          setTimeout(() => {
            block.style.opacity = '1';
            block.style.transform = 'translateY(0)';
          }, 100);
          
          setTimeout(() => {
            btnWrap.style.opacity = '1';
            btnWrap.style.transform = 'translateY(0)';
          }, 200);
          
          setTimeout(() => {
            noteWrap.style.opacity = '1';
            noteWrap.style.transform = 'translateY(0)';
          }, 300);
          
          setTimeout(() => {
            foot.style.opacity = '1';
            foot.style.transform = 'translateY(0)';
          }, 400);
          
          // Clean intro DOM
          setTimeout(() => {
            if (intro.parentNode) intro.remove();
          }, 900);
        }, 300);
      }, 2000);
    });

    // ── Init ───────────────────────────────────────────────────────
    (async () => {
      await detectAbi();
      await fetchRelease();
    })();
  </script>
</body>
</html>
